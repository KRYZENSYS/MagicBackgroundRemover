services:
  - type: web
    name: magicbg-bot
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: WEBHOOK_BASE
        value: https://magicbg-bot.onrender.com
      - key: USE_WEBHOOK
        value: "true"
      - key: WEBHOOK_HOST
        value: 0.0.0.0
      - key: WEBHOOK_PORT
        value: "10000"
      - key: WEBHOOK_PATH
        value: /tg/webhook
      - key: WEBHOOK_URL
        value: https://magicbg-bot.onrender.com/tg/webhook
      - key: DATABASE_URL
        fromDatabase:
          name: magicbg-db
          property: connectionString
      - key: USE_REDIS
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: FORCE_CPU
        value: "true"

databases:
  - name: magicbg-db
    plan: free
    databaseName: magicdb
    user: magic
    region: oregon