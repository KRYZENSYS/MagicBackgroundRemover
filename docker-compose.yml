version: '3.9'

services:
  bot:
    build: .
    container_name: magicbg_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/models:/data/models
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    container_name: magicbg_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: magic
      POSTGRES_PASSWORD: bg
      POSTGRES_DB: magicdb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: magicbg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: magicbg_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - bot

volumes:
  db_data: